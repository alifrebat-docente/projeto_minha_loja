<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Minha Loja Virtual</title>

    <link rel="stylesheet" href="../css/style_formulario.css">
</head>

<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                SuaLoja
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html"> HOME </a></li>
                    <li><a href="cadastro.html"> Cadastro </a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="carrinho.html"><img src="../imagens/icones/carrinho.png" alt="Carrinho"></a></li>
                </ul>
            </nav>
        </header>

        <section id="pesquisa">
            <h3>Cadastro Pessoa</h3>
        </section>

        <section id="form">

            <form id="form-pessoa">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" class="input01" required maxlength="60"
                    placeholder="Digite Seu nome">

                <label for="cpf">CPF</label>
                <input type="text" name="cpf" id="cpf" class="input02" required maxlength="14"
                    placeholder="Digite Seu cpf">

                <label for="telefone">Telefone</label>
                <input type="text" name="telefone" id="telefone" class="input02" required maxlength="9"
                    placeholder="Digite Seu telefone">

                <label for="email">Email</label>
                <input type="text" name="email" id="email" class="input01" required maxlength="100"
                    placeholder="Digite Seu email">

                <label for="data-nascimento">Data Nascimento</label>
                <input type="date" name="data-nascimento" id="data-nascimento" class="input02" required>

                <label for="sexo">Sexo</label>
                <div id="inputRadios">
                    <input type="radio" name="sexo" id="sexoM" class="inputOP" value="M"> Masculino
                    <input type="radio" name="sexo" id="sexoF" class="inputOP" value="F"> Feminino
                    <input type="radio" name="sexo" id="sexoN" class="inputOP" value="N"> Não Declarar
                </div>

                <label for="cep">CEP</label>
                <input type="text" name="cep" id="cep" class="input02" required maxlength="9"
                    placeholder="Digite Seu CEP">

                <div id="div-dados-endereco" class="oculto">
                    <label for="logradouro">Logradouro</label>
                    <input type="text" name="logradouro" id="logradouro" class="input01">

                    <label for="num-residencia">Número</label>
                    <input type="text" name="logradouro" id="logradouro" class="input02" maxlength="10"
                        placeholder="Digite o número da residencia" required>

                    <label for="complemento-end">Complemento</label>
                    <input type="text" name="complemento-end" id="complemento-end" class="input01" maxlength="100"
                        placeholder="Digite o número da residencia">

                    <label for="bairro">Bairro</label>
                    <input type="text" name="bairro" id="bairro" class="input01">

                    <label for="localidade">localidade</label>
                    <input type="text" name="localidade" id="localidade" class="input01">

                    <label for="uf">UF</label>
                    <input type="text" name="uf" id="uf" class="input02">
                </div>

                <label for="senha"> Senha </label>
                <input type="password" name="senha" id="senha" class="input02" required maxlength="6"
                    placeholder="Informe a senha">

                <div id="div-btns">
                    <button type="submit" id="btn-add"> Cadastrar </button>
                    <button type="reset" id="btn-limpar">Limpar</button>
                </div>

            </form>

        </section>

        <footer id="rodape">
            <h2>&copy 2026 SuaLoja S.A. Todos os direitos reservados</h2>
            <p>Formas de pagamento: Pix, Cartões de Débito e Crédito</p>
        </footer>

    </main>

</body>

</html>
